services:
  - type: web
    name: escape-game-builder
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_SUPABASE_STORAGE_BUCKET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_CREDIT_ADMIN_KEY
        sync: false
      - key: OPENAI_TEXT_MODEL
        sync: false
      - key: OPENAI_IMAGE_MODEL
        sync: false
      - key: OPENAI_IMAGE_SIZE
        sync: false
      - key: OPENAI_IMAGE_QUALITY
        sync: false
      - key: OPENAI_ITEM_THUMBNAIL_MODEL
        value: gpt-image-1-mini
      - key: OPENAI_ITEM_THUMBNAIL_SIZE
        value: 1024x1024
      - key: OPENAI_ITEM_THUMBNAIL_QUALITY
        value: low
      - key: OPENAI_API_KEY
        sync: false
